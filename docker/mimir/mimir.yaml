target: all

server:
  http_listen_port: 8080
  grpc_listen_port: 9095
  log_level: info

blocks_storage:
  backend: s3
  s3:
    bucket_name: avonale-otel-mimir-prod
    endpoint: s3.us-east-2.amazonaws.com
    region: us-east-2
  tsdb:
    dir: /tmp/mimir/tsdb
    retention_period: 720h
  bucket_store:
    sync_dir: /tmp/mimir/blocks-sync

compactor:
  data_dir: /tmp/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    kvstore:
      store: memberlist

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist

memberlist:
  bind_port: 7946
  advertise_port: 7946

limits:
  max_global_series_per_user: 100000
  max_global_series_per_metric: 20000
  ingestion_rate: 10000
  ingestion_burst_size: 20000
  max_query_parallelism: 32

usage_stats:
  enabled: false